<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Kcal Beregner</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px;
    }
    header {
      padding: 18px 0 12px;
    }
    h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: -0.04em;
    }
    .subtitle {
      margin-top: 6px;
      color: #6b7280;
      font-size: 15px;
    }
    .card {
      background: white;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-top: 14px;
    }
    label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      margin: 14px 0 6px;
    }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      outline: none;
    }
    input:focus {
      border-color: #111827;
    }
    button {
      width: 100%;
      margin-top: 18px;
      padding: 15px;
      border: 0;
      border-radius: 16px;
      background: #111827;
      color: white;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }
    button:active {
      transform: scale(0.99);
    }
    .total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 18px;
    }
    .total strong {
      font-size: 30px;
    }
    .food-list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .food-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .food-name {
      font-weight: 800;
    }
    .food-details {
      color: #6b7280;
      font-size: 13px;
      margin-top: 3px;
    }
    .kcal {
      font-weight: 900;
      white-space: nowrap;
    }
    .delete-btn {
      width: auto;
      margin: 0;
      padding: 8px 10px;
      border-radius: 10px;
      background: #fee2e2;
      color: #991b1b;
      font-size: 14px;
    }
    .empty {
      color: #6b7280;
      text-align: center;
      padding: 18px 8px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Kcal Beregner</h1>
      <div class="subtitle">Indtast mad, gram og kcal pr. 100 g.</div>
    </header>

    <section class="card total">
      <span>I alt i dag</span>
      <strong><span id="totalKcal">0</span> kcal</strong>
    </section>

    <section class="card">
      <label for="foodName">Madvare</label>
      <input id="foodName" placeholder="Fx kylling, ris eller rugbrød" />

      <div class="row">
        <div>
          <label for="grams">Gram</label>
          <input id="grams" type="number" inputmode="decimal" placeholder="200" />
        </div>
        <div>
          <label for="kcal100">Kcal / 100 g</label>
          <input id="kcal100" type="number" inputmode="decimal" placeholder="165" />
        </div>
      </div>

      <button id="addBtn">Tilføj madvare</button>
    </section>

    <section class="card">
      <h2 style="margin: 0 0 8px; font-size: 20px;">Madvarer</h2>
      <div id="foodList" class="food-list"></div>
    </section>
  </main>

  <script>
    const foodName = document.getElementById('foodName');
    const grams = document.getElementById('grams');
    const kcal100 = document.getElementById('kcal100');
    const addBtn = document.getElementById('addBtn');
    const foodList = document.getElementById('foodList');
    const totalKcal = document.getElementById('totalKcal');

    let foods = JSON.parse(localStorage.getItem('foods') || '[]');

    function saveFoods() {
      localStorage.setItem('foods', JSON.stringify(foods));
    }

    function calculateKcal(gramValue, kcalPer100) {
      return Math.round((gramValue * kcalPer100) / 100);
    }

    function render() {
      foodList.innerHTML = '';

      if (foods.length === 0) {
        foodList.innerHTML = '<div class="empty">Ingen madvarer endnu.</div>';
      }

      let total = 0;

      foods.forEach((food, index) => {
        total += food.kcal;

        const item = document.createElement('div');
        item.className = 'food-item';
        item.innerHTML = `
          <div>
            <div class="food-name">${food.name}</div>
            <div class="food-details">${food.grams} g · ${food.kcal100} kcal/100 g</div>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <div class="kcal">${food.kcal} kcal</div>
            <button class="delete-btn" onclick="deleteFood(${index})">Slet</button>
          </div>
        `;
        foodList.appendChild(item);
      });

      totalKcal.textContent = total;
    }

    function addFood() {
      const name = foodName.value.trim();
      const gramValue = Number(grams.value);
      const kcalPer100 = Number(kcal100.value);

      if (!name || gramValue <= 0 || kcalPer100 <= 0) {
        alert('Udfyld madvare, gram og kcal pr. 100 g.');
        return;
      }

      foods.push({
        name,
        grams: gramValue,
        kcal100: kcalPer100,
        kcal: calculateKcal(gramValue, kcalPer100)
      });

      saveFoods();
      render();

      foodName.value = '';
      grams.value = '';
      kcal100.value = '';
      foodName.focus();
    }

    function deleteFood(index) {
      foods.splice(index, 1);
      saveFoods();
      render();
    }

    addBtn.addEventListener('click', addFood);

    [foodName, grams, kcal100].forEach(input => {
      input.addEventListener('keydown', event => {
        if (event.key === 'Enter') addFood();
      });
    });

    render();
  </script>
</body>
</html>
